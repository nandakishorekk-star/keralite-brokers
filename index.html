<title>Keralite Brokers</title>
<style>
  :root {
    --bg:        #0A0A0B;
    --ink:       #F4F1E9;
    --ink-soft:  #8B877C;
    --gold:      #C9A24B;
    --gold-lit:  #E4C577;
    --hair:      rgba(201,162,75,0.22);
    --sans: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; background: var(--bg);
    font-family: var(--sans); color: var(--ink);
    display: flex; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .phone { width: 100%; max-width: 430px; background: var(--bg); position: relative; padding-bottom: 44px; }

  /* --- minimal header: black with a single soft gold glow, curved bottom --- */
  .header {
    position: relative; height: 264px; color: var(--ink);
    border-radius: 0 0 46% 46% / 0 0 60px 60px;
    background:
      radial-gradient(90% 70% at 50% -8%, rgba(201,162,75,0.30), transparent 60%),
      #0C0C0D;
    border-bottom: 1px solid var(--hair);
    overflow: hidden;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 52px 24px 0;
  }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 17px; letter-spacing: .01em; }
  .logo .spark { width: 18px; height: 18px; color: var(--gold); }
  .logo .spark svg { width: 100%; height: 100%; display: block; }

  .menu { position: relative; }
  .menu summary {
    list-style: none; cursor: pointer; width: 30px; height: 30px;
    display: grid; place-items: center; color: var(--gold);
  }
  .menu summary::-webkit-details-marker { display: none; }
  .menu summary svg { width: 24px; height: 24px; }
  .menu[open] .sheet { display: block; }
  .sheet {
    display: none; position: absolute; right: 0; top: 40px; z-index: 30;
    background: #101012; border: 1px solid var(--hair);
    border-radius: 14px; padding: 6px; min-width: 188px;
  }
  .sheet a {
    display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink);
    font-size: 14px; font-weight: 500; padding: 10px 12px; border-radius: 9px;
  }
  .sheet a:hover { background: rgba(201,162,75,0.12); }
  .sheet a i { color: var(--gold); font-style: normal; font-size: 11px; letter-spacing: .08em; width: 20px; }

  /* --- brand mark (their logo) as the avatar --- */
  .avatar-wrap { display: flex; justify-content: center; margin-top: -58px; position: relative; z-index: 5; }
  .mark { width: 96px; height: auto; display: block; filter: drop-shadow(0 10px 22px rgba(0,0,0,.55)); }
  .logo .mark { width: 20px; filter: none; }

  /* --- identity --- */
  .name {
    text-align: center; font-weight: 700; letter-spacing: -0.02em;
    font-size: 34px; line-height: 1.08; margin: 18px 20px 10px; text-wrap: balance;
  }
  .slogan {
    text-align: center; color: var(--gold); font-size: 11.5px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase; margin: 0 20px 14px;
  }
  .divider { width: 34px; height: 1.5px; background: var(--gold); margin: 0 auto 16px; opacity: .8; }
  .bio {
    text-align: center; color: var(--ink-soft); font-size: 15.5px; line-height: 1.6;
    max-width: 32ch; margin: 0 auto 30px; padding: 0 24px;
  }

  /* --- social row: thin gold-ring circles, fill on hover --- */
  .socials { display: flex; justify-content: center; gap: 16px; margin-bottom: 32px; }
  .socials a {
    width: 54px; height: 54px; border-radius: 50%;
    border: 1px solid var(--hair); color: var(--gold);
    display: grid; place-items: center; text-decoration: none;
    transition: background .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;
  }
  .socials a:hover, .socials a:focus-visible {
    background: var(--gold); color: #0A0A0B; border-color: var(--gold);
    transform: translateY(-2px); outline: none;
  }
  .socials a:focus-visible { outline: 2px solid var(--gold-lit); outline-offset: 3px; }
  .socials svg { width: 23px; height: 23px; display: block; }

  /* --- primary CTA: the one bold gold element --- */
  .cta-wrap { padding: 0 22px; }
  .cta {
    display: flex; align-items: center; gap: 13px; text-decoration: none; color: #0A0A0B;
    background: linear-gradient(100deg, var(--gold-lit), var(--gold));
    border-radius: 16px; padding: 15px 17px;
    transition: transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 14px 30px -14px rgba(201,162,75,.5);
  }
  .cta:hover, .cta:focus-visible {
    transform: translateY(-2px); box-shadow: 0 20px 38px -14px rgba(201,162,75,.6); outline: none;
  }
  .cta:focus-visible { outline: 2px solid var(--gold-lit); outline-offset: 3px; }
  .cta .disc {
    width: 38px; height: 38px; border-radius: 50%; flex: none;
    background: rgba(0,0,0,.14); display: grid; place-items: center; color: #0A0A0B;
  }
  .cta .disc svg { width: 21px; height: 21px; }
  .cta .label { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .cta .arrow { margin-left: auto; flex: none; }
  .cta .arrow svg { width: 19px; height: 19px; display: block; }

  .foot { text-align: center; color: var(--ink-soft); font-size: 12.5px; margin-top: 28px; letter-spacing: .04em; }
  .foot span { color: var(--gold); margin: 0 6px; }

  @keyframes rise { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: none;} }
  .an { opacity: 0; animation: rise .5s cubic-bezier(.2,.7,.25,1) forwards; }
  .a1{animation-delay:.05s}.a2{animation-delay:.13s}.a3{animation-delay:.21s}.a4{animation-delay:.29s}.a5{animation-delay:.37s}
  @media (prefers-reduced-motion: reduce){ .an{opacity:1;animation:none} .socials a,.cta{transition:none} }
</style>
